<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion-commerce</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="productdetails.css">
</head>
<body>
    <section id="header">
        <a href="index.html" class="fashion-title"><h1>E-commerce</h1></a>
        <div>
            <ul id="nav-bar">
                <li><a href="index.html">Home</a></li>
                <li><a href="product.html">Collections</a></li>
                <li><a href="Info">About</a></li>
            </ul>
        </div>
        <div>
            <ul id="nav-bar1">
                <li><a href="cart.html"><img src="images/heart.svg" alt=""></a></li>
                <li><a href="#"><img src="images/handbag.svg" alt=""></a></li>
                <li><a href="#"><img src="images/circle-user-round.svg" alt=""></a></li>
            </ul>
        </div>
    </section>
    <hr>

    <section id="product-detail">
        <div class="info-box">
            <h4>V-NECK T-SHIRT</h4>
            <h1>Abstract Print Shirt</h1>
            <p class="price">$99</p>
            <p class="tax">MRP incl. of all taxes</p>
            <p class="desc">Relaxed-fit shirt. Camp collar and short sleeves. Button-up front.</p>

            <div class="detail-section">
                <p class="detail-label">Color</p>
                <div class="colors">
                    <span class="color-dot" style="background:#d4d4d4;"></span>
                    <span class="color-dot" style="background:#888;"></span>
                    <span class="color-dot active" style="background:#1a1a1a;"></span>
                    <span class="color-dot" style="background:#088178;"></span>
                    <span class="color-dot" style="background:#c4b8e8;"></span>
                </div>
            </div>

            <div class="detail-section">
                <p class="detail-label">Size</p>
                <div class="sizes">
                    <span class="size-btn">XS</span>
                    <span class="size-btn">S</span>
                    <span class="size-btn active">M</span>
                    <span class="size-btn">L</span>
                    <span class="size-btn">XL</span>
                    <span class="size-btn">2X</span>
                </div>
            </div>

            <button class="add-btn">ADD TO CART</button>
        </div>

        <div class="product-img">
            <img src="images/Rectangle 13.png" alt="">
        </div>
    </section>
</body>
</html>
