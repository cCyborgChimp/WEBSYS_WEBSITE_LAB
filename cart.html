<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion-commerce</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cart.css">
</head>
<body>
    <section id="header">
        <a href="index.html" class="fashion-title"><h1>E-commerce</h1></a>
        <div>
            <ul id="nav-bar">
                <li><a href="index.html">Home</a></li>
                <li><a href="product_page.html">Collections</a></li>
                <li><a href="#">About</a></li>
            </ul>
        </div>
        <div>
            <ul id="nav-bar1">
                <li><a href="cart.html"><img src="images/heart.svg" alt=""></a></li>
                <li><a href="#"><img src="images/handbag.svg" alt=""></a></li>
                <li><a href="#"><img src="images/circle-user-round.svg" alt=""></a></li>
            </ul>
        </div>
    </section>
    <hr>
 
    <section id="cart-section">
        <div class="cart-left">
            <div class="cart-tabs">
                <span class="tab active">SHOPPING BAG</span>
                <span class="tab">FAVOURITES</span>
            </div>
 
            <div class="cart-items">
                <div class="cart-item">
                    <div class="item-image">
                        <img src="images/Rectangle 13.png" alt="">
                    </div>
                    <div class="item-info">
                        <h4>Cotton T-Shirt</h4>
                        <p class="item-type">Full Sleeve Zipper</p>
                        <p class="item-price">$99</p>
 
                        <div class="detail-section">
                            <p class="detail-label">Size</p>
                            <div class="sizes">
                                <span class="size-btn">S</span>
                                <span class="size-btn active">L</span>
                                <span class="size-btn">XL</span>
                            </div>
                        </div>
 
                        <div class="quantity-section">
                            <p class="detail-label">Quantity</p>
                            <div class="quantity">
                                <button class="qty-btn">−</button>
                                <span class="qty-num">1</span>
                                <button class="qty-btn">+</button>
                            </div>
                        </div>
                    </div>
                </div>
 
                <div class="cart-item">
                    <div class="item-image">
                        <img src="images/Rectangle 20 (1).png" alt="">
                    </div>
                    <div class="item-info">
                        <h4>Cotton T-Shirt</h4>
                        <p class="item-type">Basic Slim Fit T-Shirt</p>
                        <p class="item-price">$99</p>
 
                        <div class="detail-section">
                            <p class="detail-label">Size</p>
                            <div class="sizes">
                                <span class="size-btn">S</span>
                                <span class="size-btn active">L</span>
                                <span class="size-btn">XL</span>
                            </div>
                        </div>
 
                        <div class="quantity-section">
                            <p class="detail-label">Quantity</p>
                            <div class="quantity">
                                <button class="qty-btn">−</button>
                                <span class="qty-num">1</span>
                                <button class="qty-btn">+</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
 
        <div class="cart-right">
            <h3>ORDER SUMMARY</h3>
            <div class="summary-item">
                <span>Subtotal</span>
                <span>$180</span>
            </div>
            <div class="summary-item">
                <span>Shipping</span>
                <span>$10</span>
            </div>
            <div class="summary-total">
                <span>TOTAL</span>
                <span>$190</span>
            </div>
            <label class="terms-check">
                <input type="checkbox">
                I agree to the Terms and Conditions
            </label>
            <button class="continue-btn">CONTINUE</button>
        </div>
    </section>
</body>
</html>
