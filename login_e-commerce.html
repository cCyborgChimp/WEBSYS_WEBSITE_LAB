<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <link href='https://fonts.googleapis.com/css?family=Poppins' rel='stylesheet'>
</head>
<body>
    <div class="left-side">
        <form >
        <div class="wrapper">
            <h1>Welcome Back!</h1>
            <h4>Enter your Credentials to access your account</h4>
            
            <div class="input-box">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">
            </div>
            <div class="input-box">
                <label for="password">Password</label>
                <br>
                <input type="password" id="pass" name="pass" placeholder="Password" required maxlength="15">
            </div>
             <div class="term">
                <label><input type="checkbox"> Remember for 30 days</label>
                <a href="#">Forgot password?</a>
            </div>
            <br>
            
            <button type="submit" class="btn">Login    </button>
            
            <div class="have">
                <p>Don't have an account? <a href="#">Sign up</a></p>
            </div>
        </div>
    </form>
    </div>
    <div class="right-side">
        <img src="leaf.jpg" alt="picture">
    </div>
</body>
</html>
