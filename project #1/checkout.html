<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion-commerce</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cart.css">
</head>
<body>
    <section id="header">
        <a href="index.html" class="fashion-title"><h1>E-commerce</h1></a>
        <div>
            <ul id="nav-bar">
                <li><a href="index.html">Home</a></li>
                <li><a href="product.html">Collections</a></li>
                <li><a href="Info">About</a></li>
            </ul>
        </div>
        <div>
            <ul id="nav-bar1">
                <li><a href="cart.html"><img src="images/heart.svg" alt=""></a></li>
                <li><a href="#"><img src="images/handbag.svg" alt=""></a></li>
                <li><a href="#"><img src="images/circle-user-round.svg" alt=""></a></li>
            </ul>
        </div>
    </section>
    <hr>
 
    <section id="cart-section">
<section id="checkout-section">
  <a href="cart.html" class="back-arrow">←——</a>
  <h1 class="checkout-title">Checkout</h1>

  <div class="checkout-steps">
    <span class="step active">Information</span>
    <span class="step">Shipping</span>
    <span class="step">Payment</span>
  </div>

  <div class="checkout-left">
    <p class="section-label">Contact Info</p>
    <fieldset>
      <div class="field"><input type="email" placeholder="Email"></div>
      <div class="field"><input type="tel" placeholder="Phone"></div>
    </fieldset>

    <p class="section-label">Shipping Address</p>
    <fieldset>
      <div class="field-row">
        <div class="field"><input type="text" placeholder="First Name"></div>
        <div class="field"><input type="text" placeholder="Last Name"></div>
      </div>
      <div class="field">
        <select><option disabled selected>Country</option></select>
      </div>
      <div class="field"><input type="text" placeholder="State / Region"></div>
      <div class="field"><input type="text" placeholder="Address"></div>
      <div class="field-row">
        <div class="field"><input type="text" placeholder="City"></div>
        <div class="field"><input type="text" placeholder="Postal Code"></div>
      </div>
    </fieldset>

    <button class="ship-btn">Shipping →</button>
  </div>
</section>
        <div class="cart-right">
  <div style="position: relative;">
    <span class="order-count">(2)</span>
    <h3>YOUR ORDER</h3>
  </div>

  <div class="order-item">
    <div class="order-img"><img src="images/Rectangle 13.png" alt=""></div>
    <div class="order-details">
      <div class="order-top">
        <div>
          <p class="order-name">Basic Heavy T-Shirt</p>
          <p class="order-variant">Black / L</p>
        </div>
        <a class="change-link">Change</a>
      </div>
      <p class="order-qty">(1)</p>
      <p class="order-price">$99</p>
    </div>
  </div>

  <div class="order-item">
    <div class="order-img"><img src="images/Rectangle 20 (1).png" alt=""></div>
    <div class="order-details">
      <div class="order-top">
        <div>
          <p class="order-name">Basic Fit T-Shirt</p>
          <p class="order-variant">Black / L</p>
        </div>
        <a class="change-link">Change</a>
      </div>
      <p class="order-qty">(1)</p>
      <p class="order-price">$99</p>
    </div>
  </div>

  <div class="summary-item"><span>Subtotal</span><span>$180.00</span></div>
  <div class="summary-item"><span>Shipping</span><span style="font-style:italic;font-size:11px;">Calculated at next step</span></div>
  <div class="summary-total"><span>TOTAL</span><span>$180.00</span></div>
</div>
    </section>
</body>
</html>
